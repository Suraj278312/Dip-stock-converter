    :root {
      /* Light Mode by Default */
      --bg-color: #f1f5f9;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(148, 163, 184, 0.2);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #10b981;
      --accent-hover: #059669;
      --danger: #ef4444;
      --input-bg: rgba(255, 255, 255, 0.9);
      --bg-gradient: radial-gradient(circle at top right, #e2e8f0, #f1f5f9);
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #10b981;
      --accent-hover: #059669;
      --danger: #ef4444;
      --input-bg: rgba(15, 23, 42, 0.6);
      --bg-gradient: radial-gradient(circle at top right, #1e1b4b, #0f172a);
    }


    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }


    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      transition: background 0.3s, color 0.3s;
    }



    .app-container {
      width: 100%;
      max-width: 1000px;
      padding: 30px 20px;
      margin: 0 auto;
    }

    .dashboard-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    @media (min-width: 800px) {
      .dashboard-layout {
        grid-template-columns: 1.2fr 1fr;
      }
    }

    .header {
      text-align: center;
      padding: 10px 0 20px 0;
      position: relative;
    }


    .header h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Cards */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Forms & Inputs */
    .form-group {
      margin-bottom: 15px;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input,
    select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    /* Results */
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .result-box {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .result-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .result-val {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
    }

    .highlight-box {
      background: linear-gradient(135deg, var(--primary), #2563eb);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    .highlight-box .result-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }

    .highlight-box .result-val {
      color: #fff;
      font-size: 36px;
      font-weight: 700;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--input-bg);
      color: var(--text-main);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 20px;
    }

    .modal-content {
      background: var(--bg-color);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--card-border);
    }

    .close-btn {
      background: transparent;
      color: var(--text-muted);
      border: none;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }

    .close-btn:hover {
      color: var(--text-main);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 10px;
    }

    th,
    td {
      border-bottom: 1px solid var(--card-border);
      padding: 12px 8px;
      text-align: left;
    }

    th {
      color: var(--text-muted);
      font-weight: 500;
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: var(--danger);
      color: white;
    }

</head>

          <!-- Editable Calculation Fields -->

            <div class="form-group">

            </div>
            <div class="form-group">
              <label>Difference</label>
              <input type="number" id="difference-input" step="0.01" placeholder="0.00">
            </div>
          </div>

          <div class="form-group">
            <label>Point Half</label>

          <!-- Results Display -->
          <div class="result-grid">
            <div class="result-box">
              <span class="result-label">Point Value</span>
              <span class="result-val" id="res-point-value">0</span>
            </div>
            <div class="result-box">
              <span class="result-label">Diff. Value</span>
              <span class="result-val" id="res-diff-value">0.00</span>
            </div>
          </div>

          <div class="highlight-box">
            <span class="result-label">Actual Total Stock</span>
            <div class="result-val" id="res-actual-stock">0</div>
          </div>

          <button id="save-btn" class="btn btn-primary">Save & Submit</button>
        </div>


      </div>
      <!-- Right Column -->
      <div class="col-right" style="display: flex; flex-direction: column; gap: 25px;">
        <!-- Dip Search -->

        <div class="glass-card">
          <div class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            Quick Search
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Search Dip</label>
              <input type="number" id="search-dip" step="1" placeholder="e.g. 164">
            </div>
          </div>
          <div class="result-grid" style="margin-bottom: 0;">
            <div class="result-box">
              <span class="result-label">Volume</span>
              <span class="result-val" id="sr-volume" style="color: var(--text-main); font-size: 16px;">0.00</span>
            </div>
            <div class="result-box">
              <span class="result-label">Difference</span>
              <span class="result-val" id="sr-difference" style="color: var(--text-main); font-size: 16px;">0.00</span>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="form-row" style="justify-content: center; width: 100%;">
          <div class="form-group" style="flex: 1;">
            <button id="chart-btn" class="btn btn-secondary">Dip Chart</button>
          </div>
          <div class="form-group">
            <button id="logs-btn" class="btn btn-secondary">View Logs</button>
          </div>
        </div>
      </div>
    </div>

  </div>

    function getDipChartEntry(product, baseDip) {
      // The provided chart applies to the selected tank regardless of product dropdown.
      return dipChartData.find(entry => entry.dip === baseDip);
    }

    // --- Firebase Database Functions ---
    // A cache for logs so we don't query repeatedly unless needed
    let cachedLogs = [];

    async function getLogs() {
      try {
        const q = query(collection(db, "dip_stock_logs"), orderBy("created_at", "desc"));
        const snapshot = await getDocs(q);
        const logs = [];
        snapshot.forEach((doc) => {
          logs.push({ id: doc.id, ...doc.data() });
        });
        cachedLogs = logs;
        return logs;
      } catch (e) {
        console.error("Error fetching logs: ", e);
        return cachedLogs; // return cached on error
      }
    }

    async function saveLog(logEntry) {
      try {
        logEntry.created_at = serverTimestamp();
        const docRef = await addDoc(collection(db, "dip_stock_logs"), logEntry);
        logEntry.id = docRef.id;
        // Optionally update cache locally to avoid re-fetch immediately
        cachedLogs.unshift(logEntry);
        return logEntry;
      } catch (e) {
        console.error("Error adding document: ", e);
        alert("Failed to save to cloud.");
        return null;
      }
    }

    async function deleteLog(id) {
      try {
        await deleteDoc(doc(db, "dip_stock_logs", id));
        cachedLogs = cachedLogs.filter(log => log.id !== id);
      } catch (e) {
        console.error("Error deleting document: ", e);
        alert("Failed to delete log from cloud.");
      }
    }


    // --- UI Logic ---
    document.addEventListener('DOMContentLoaded', () => {

      // Theme Toggle
      const themeToggle = document.getElementById('theme-toggle');
      const currentTheme = localStorage.getItem('theme') || 'dark';
      document.body.setAttribute('data-theme', currentTheme);

      themeToggle.addEventListener('click', () => {
        const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
      });


      // Elements
      const dateInput = document.getElementById('date-input');
      const productInput = document.getElementById('product-input');
      const dipInput = document.getElementById('dip-input');

      const volumeInput = document.getElementById('volume-input');
      const differenceInput = document.getElementById('difference-input');
      const pointHalfInput = document.getElementById('pointhalf-input');

      const resPointValue = document.getElementById('res-point-value');
      const resDiffValue = document.getElementById('res-diff-value');
      const resActualStock = document.getElementById('res-actual-stock');

      // Set Default Date
      dateInput.valueAsDate = new Date();

      // Recalculate everything based on the current inputs
      function recalculate() {
        const volumeVal = parseFloat(volumeInput.value) || 0;
        const differenceVal = parseFloat(differenceInput.value) || 0;
        const pointHalfVal = parseFloat(pointHalfInput.value) || 0;

        const pointValue = pointHalfVal * 2;
        const diffValue = differenceVal * pointValue;
        const actualTotalStock = Math.round(volumeVal + diffValue);

        resPointValue.innerText = pointValue;
        resDiffValue.innerText = diffValue.toFixed(2);
        resActualStock.innerText = actualTotalStock;
      }

      // Listeners
      dipInput.addEventListener('input', recalculate);
      productInput.addEventListener('change', recalculate);

      // Listeners for manual overrides
      volumeInput.addEventListener('input', recalculate);
      differenceInput.addEventListener('input', recalculate);
      pointHalfInput.addEventListener('input', recalculate);

      // Search Logic
      const searchDip = document.getElementById('search-dip');
      const srVolume = document.getElementById('sr-volume');
      const srDifference = document.getElementById('sr-difference');

      function performSearch() {
        const val = searchDip.value;
        const product = productInput.value;

        if (!val) {
          srVolume.innerText = '0.00';
          srDifference.innerText = '0.00';
          return;
        }

        const chartData = getDipChartEntry(product, parseInt(val));
        if (chartData) {
          srVolume.innerText = chartData.volume.toFixed(2);
          srDifference.innerText = chartData.difference.toFixed(2);
        } else {
          srVolume.innerText = 'Not Found';
          srDifference.innerText = 'Not Found';
        }
      }

      searchDip.addEventListener('input', performSearch);

      // Save Logic
      const saveBtn = document.getElementById('save-btn');
      saveBtn.addEventListener('click', async () => {
        if (!dipInput.value || !volumeInput.value) {
          alert("Please enter at least a Dip reading and Volume to save.");
          return;
        }

        saveBtn.innerText = "Saving...";
        saveBtn.disabled = true;

        const pointHalfVal = parseFloat(pointHalfInput.value) || 0;
        const pointValue = pointHalfVal * 2;
        const diffValue = (parseFloat(differenceInput.value) || 0) * pointValue;
        const actualTotalStock = Math.round((parseFloat(volumeInput.value) || 0) + diffValue);

        const logEntry = {
          date: dateInput.value,
          product: productInput.value,
          dip: dipInput.value,
          volume: parseFloat(volumeInput.value) || 0,
          difference: parseFloat(differenceInput.value) || 0,
          pointHalf: pointHalfVal,
          pointValue: pointValue,
          diffValue: diffValue.toFixed(2),
          actual_total_stock: actualTotalStock
        };

        await saveLog(logEntry);

        // Reset
        dipInput.value = '';
        volumeInput.value = '';
        differenceInput.value = '';
        pointHalfInput.value = '';
        recalculate();

        saveBtn.disabled = false;
        saveBtn.innerText = "Saved Successfully!";
        setTimeout(() => saveBtn.innerText = "Save & Submit", 2000);
      });

      // Modals
      const logsModal = document.getElementById('logs-modal');
      const chartModal = document.getElementById('chart-modal');

      document.getElementById('logs-btn').addEventListener('click', () => {
        renderLogs();
        logsModal.style.display = 'flex';
      });
      document.getElementById('close-logs').addEventListener('click', () => {
        logsModal.style.display = 'none';
      });

      document.getElementById('chart-btn').addEventListener('click', () => {
        renderChart();
        chartModal.style.display = 'flex';
      });
      document.getElementById('close-chart').addEventListener('click', () => {
        chartModal.style.display = 'none';
      });

      // Logs Rendering
      const logsTbody = document.getElementById('logs-tbody');
      async function renderLogs() {
        logsTbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">Loading logs...</td></tr>`;
        const logs = await getLogs();
        logsTbody.innerHTML = '';
        if (logs.length === 0) {
          logsTbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No logs found</td></tr>`;
          return;
        }

        logs.forEach(log => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${log.date}</td>
            <td>${log.product}</td>
            <td>${log.dip}</td>
            <td style="font-weight: bold; color: var(--primary);">${log.actual_total_stock}</td>
            <td style="white-space: nowrap;">
              <div style="display: inline-flex; gap: 4px; margin-right: 8px;">
                <button class="download-pdf-btn" data-id="${log.id}" style="background: rgba(59, 130, 246, 0.1); color: var(--primary); border: 1px solid rgba(59, 130, 246, 0.2); padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600;" title="Download PDF">PDF</button>
                <button class="download-excel-btn" data-id="${log.id}" style="background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.2); padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600;" title="Download Excel">XLS</button>
              </div>
              <button class="delete-btn" data-id="${log.id}">Del</button>
            </td>
          `;
          logsTbody.appendChild(tr);
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            if (confirm("Delete log?")) {
              e.target.innerText = "Wait...";
              e.target.disabled = true;
              await deleteLog(e.target.closest('button').getAttribute('data-id'));
              renderLogs();
            }
          });
        });

        document.querySelectorAll('.download-pdf-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.target.closest('button').getAttribute('data-id');
            const log = logs.find(l => l.id === id);
            if (log) downloadSingleLog(log);
          });
        });

        document.querySelectorAll('.download-excel-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.target.closest('button').getAttribute('data-id');
            const log = logs.find(l => l.id === id);
            if (log) downloadSingleLogExcel(log);
          });
        });
      }

      function downloadSingleLogExcel(log) {
        if (!window.XLSX) return alert('Excel library loading...');
        const data = [{
          'Date': log.date,
          'Product': log.product,
          'Dip': log.dip,
          'Volume': log.volume,
          'Difference': log.difference,
          'Point Half': log.pointHalf,
          'Point Value': log.pointValue,
          'Diff Value': log.diffValue,
          'Total Stock': log.actual_total_stock
        }];
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Receipt");
        XLSX.writeFile(wb, `Log_${log.date}_${log.product.replace('/', '-')}.xlsx`);
      }

      function downloadSingleLog(log) {
        if (!window.jspdf) return alert('PDF library loading...');
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text('Dip Stock Receipt', 14, 22);

        doc.setFontSize(12);
        doc.text(`Date: ${log.date}`, 14, 32);
        doc.text(`Product: ${log.product}`, 14, 40);
        doc.text(`Dip: ${log.dip}`, 14, 48);
        doc.text(`Volume: ${log.volume}`, 14, 56);
        doc.text(`Difference: ${log.difference}`, 14, 64);
        doc.text(`Point Half: ${log.pointHalf}`, 14, 72);
        doc.text(`Point Value: ${log.pointValue}`, 14, 80);
        doc.text(`Diff Value: ${log.diffValue}`, 14, 88);

        doc.setFontSize(14);
        doc.setTextColor(59, 130, 246);
        doc.text(`Actual Total Stock: ${log.actual_total_stock}`, 14, 100);

        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text('Made By Suraj Debnath', doc.internal.pageSize.getWidth() / 2, doc.internal.pageSize.getHeight() - 10, { align: 'center' });

        doc.save(`Log_${log.date}_${log.product.replace('/', '-')}.pdf`);
      }

      // Chart Rendering
      function renderChart() {
        const tbody = document.getElementById('chart-tbody');
        tbody.innerHTML = '';
        dipChartData.forEach(d => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${d.product}</td>
            <td>${d.dip}</td>
            <td>${d.volume.toFixed(2)}</td>
            <td>${d.difference.toFixed(2)}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      // Export Logic
      document.getElementById('export-pdf-btn').addEventListener('click', async () => {
        if (!window.jspdf) return alert('PDF library loading...');
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text('Dip Stock Logs', 14, 22);

        const btn = document.getElementById('export-pdf-btn');
        btn.innerText = "Exporting...";
        const logs = await getLogs();
        btn.innerText = "Export PDF";

        const tableData = logs.map(l => [l.date, l.product, l.dip, l.volume, l.difference, l.actual_total_stock]);

        doc.autoTable({
          head: [['Date', 'Product', 'Dip', 'Volume', 'Diff', 'Total']],
          body: tableData,
          startY: 30,
          theme: 'grid',
          headStyles: { fillColor: [59, 130, 246] }
        });

        // Add footer to every page
        const pageCount = doc.internal.getNumberOfPages();
        doc.setFontSize(10);
        doc.setTextColor(100);
        for (let i = 1; i <= pageCount; i++) {
          doc.setPage(i);
          doc.text('Made By Suraj Debnath', doc.internal.pageSize.getWidth() / 2, doc.internal.pageSize.getHeight() - 10, { align: 'center' });
        }

        const dateStr = new Date().toISOString().split('T')[0];
        doc.save(`Dip_Stock_Logs_${dateStr}.pdf`);
      });

      document.getElementById('export-excel-btn').addEventListener('click', async () => {
        if (!window.XLSX) return alert('Excel library loading...');
        const btn = document.getElementById('export-excel-btn');
        btn.innerText = "Exporting...";
        const logs = await getLogs();
        btn.innerText = "Export Excel";
        
        const ws = XLSX.utils.json_to_sheet(logs);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Logs");
        const dateStr = new Date().toISOString().split('T')[0];
        XLSX.writeFile(wb, `Dip_Stock_Logs_${dateStr}.xlsx`);
      });

    });
